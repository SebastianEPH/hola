<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Formulario POSTIA</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f6f6f6;
            padding: 40px;
        }

        form {
            max-width: 420px;
            margin: 0 auto;
            background: white;
            padding: 24px;
            border-radius: 12px;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.08);
        }

        label {
            display: block;
            margin-bottom: 6px;
            font-weight: bold;
        }

        input,
        select,
        button {
            width: 100%;
            box-sizing: border-box;
            margin-bottom: 16px;
            padding: 12px;
            font-size: 16px;
            border-radius: 8px;
            border: 1px solid #ccc;
        }

        button {
            border: none;
            background: #111;
            color: white;
            cursor: pointer;
            font-weight: bold;
        }

        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        #postia-message {
            max-width: 420px;
            margin: 20px auto 0;
            text-align: center;
            font-weight: bold;
        }
    </style>
</head>

<body>
    <form id="postia-form">
        <label for="nombre">Nombre</label>
        <input
            id="nombre"
            name="nombre"
            type="text"
            placeholder="Tu nombre"
            required
        />

        <label for="empresa">Empresa</label>
        <input
            id="empresa"
            name="empresa"
            type="text"
            placeholder="Nombre de tu empresa"
            required
        />

        <label for="tipo_negocio">Tipo de negocio</label>
        <input
            id="tipo_negocio"
            name="tipo_negocio"
            type="text"
            placeholder="Ej: Restaurante, ecommerce, servicios..."
            required
        />

        <label for="whatsapp">WhatsApp</label>
        <input
            id="whatsapp"
            name="whatsapp"
            type="tel"
            placeholder="Ej: 3001234567"
            required
        />

        <label for="correo">Correo</label>
        <input
            id="correo"
            name="correo"
            type="email"
            placeholder="correo@ejemplo.com"
            required
        />

        <label for="maneja_redes">¿Maneja redes?</label>
        <select id="maneja_redes" name="maneja_redes" required>
            <option value="">Selecciona una opción</option>
            <option value="Sí">Sí</option>
            <option value="No">No</option>
        </select>

        <button id="postia-submit" type="submit">
            Enviar
        </button>
    </form>

    <p id="postia-message"></p>

    <script src="./script.js"></script>
</body>
</html>
